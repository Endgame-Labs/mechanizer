machine_id: consumption-renewal-intervention-machine
version: v1.0.0
owners:
  - team: customer-success-ops
    contact: csops@example.com
objective: "Run a daily renewal under-consumption sweep, build intervention plans, notify Slack, and optionally execute approved downstream actions."
kpis:
  - id: kpi_1
    name: "Under-consuming renewals with plan generated daily"
    target: "define-per-org"
  - id: kpi_2
    name: "Slack intervention notification delivery success"
    target: "define-per-org"
  - id: kpi_3
    name: "Approved optional action execution rate"
    target: "define-per-org"
triggers:
  - type: schedule
    cron: "0 7 * * *"
    timezone: "America/Los_Angeles"
  - type: event
    event_types: [renewal.window_opened, renewal.consumption_under_target_detected]
inputs:
  contract: gtm_event_v1
  sources: [product_telemetry, gainsight, salesforce_headless_360, salesforce, stripe, endgame_mcp, endgame_cli]
outputs:
  event_contract: gtm_event_v1
  side_effects: [slack_notify, renewal_plan_update, csm_task_create, outbound_email_send]
slo:
  p95_end_to_end_seconds: 300
  availability: "99.5%"
dependencies:
  cogs: [enrich_account_health@v1.0.0, deal_score_reasoner@v1.0.0, directive_alignment@v1.0.0, compose_outreach_message@v1.0.0, route_exec_alert@v1.0.0, approval_loop@v1.0.0]
feature_flags: []
security:
  pii_policy: "minimize"
  secret_source: "platform_secret_store"
rollback:
  mode: "disable_triggers_and_drain"
