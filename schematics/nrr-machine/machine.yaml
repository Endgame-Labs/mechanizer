machine_id: nrr-machine
version: v1.0.0
owners:
  - team: customer-success-ops
    contact: csops@example.com
objective: "Identify expansion risk and opportunity signals to improve net revenue retention outcomes."
kpis:
  - id: kpi_1
    name: "NRR improvement against baseline"
    target: "define-per-org"
  - id: kpi_2
    name: "At-risk account intervention lead time"
    target: "define-per-org"
triggers:
  - type: event
    event_types: [account.health_changed, usage.declined, renewal.window_opened]
inputs:
  contract: gtm_event_v1
  sources: [product_telemetry, gainsight, salesforce_headless_360, salesforce, stripe, endgame_mcp, endgame_cli]
outputs:
  event_contract: gtm_event_v1
  terminal_event_types:
    - nrr.play.executed
    - nrr.play.blocked
    - nrr.play.failed
  side_effects: [csm_task_create, exec_alert_send, renewal_plan_update, outbound_email_send]
slo:
  p95_end_to_end_seconds: 240
  availability: "99.5%"
dependencies:
  cogs: [enrich_account_health@v1.0.0, deal_score_reasoner@v1.0.0, directive_alignment@v1.0.0, compose_outreach_message@v1.0.0, route_exec_alert@v1.0.0, approval_loop@v1.0.0]
feature_flags: []
security:
  pii_policy: "minimize"
  secret_source: "platform_secret_store"
rollback:
  mode: "disable_triggers_and_drain"
