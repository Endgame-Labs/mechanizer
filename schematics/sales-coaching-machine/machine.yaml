machine_id: sales-coaching-machine
version: v1.0.0
owners:
  - team: sales-ops
    contact: salesops@example.com
objective: "Generate actionable coaching moments from calls, activity, and pipeline movement."
kpis:
  - id: kpi_1
    name: "Manager coaching actions completed per week"
    target: "define-per-org"
  - id: kpi_2
    name: "Win-rate lift on coached opportunities"
    target: "define-per-org"
triggers:
  - type: event
    event_types: [call.completed]
inputs:
  contract: gtm_event_v1
  sources: [gong, salesforce_headless_360, salesforce, hubspot, outreach, endgame_mcp, endgame_cli]
outputs:
  event_contract: gtm_event_v1
  terminal_event_types:
    - coaching.recommendation.created
    - coaching.recommendation.blocked
    - coaching.recommendation.failed
  side_effects: [coaching_task_create, summary_send, score_update]
slo:
  p95_end_to_end_seconds: 180
  availability: "99.5%"
dependencies:
  cogs: [directive_alignment@v1.0.0, route_exec_alert@v1.0.0, deal_score_reasoner@v1.0.0]
feature_flags: []
security:
  pii_policy: "minimize"
  secret_source: "platform_secret_store"
rollback:
  mode: "disable_triggers_and_drain"
