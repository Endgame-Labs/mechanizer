machine_id: stage-change-deal-review-machine
version: v1.0.0
owners:
  - team: revenue-ops
    contact: revops@example.com
objective: "On stage progression, run qualification/risk/missing-field review and execute approved writeback or post Slack findings."
kpis:
  - id: kpi_1
    name: "Median minutes from stage change to review completion"
    target: "define-per-org"
  - id: kpi_2
    name: "Percentage of stage changes with complete qualification evidence"
    target: "define-per-org"
triggers:
  - type: event
    event_types: [deal.stage_changed, opportunity.stage_changed]
inputs:
  contract: gtm_event_v1
  sources: [salesforce_headless_360, salesforce, hubspot, gong, endgame_mcp, endgame_cli]
outputs:
  event_contract: gtm_event_v1
  terminal_event_types:
    - deal.stage_review.writeback_applied
    - deal.stage_review.findings_posted
    - deal.stage_review.failed
  side_effects: [sfdc_update, slack_findings_send, crm_note_append]
slo:
  p95_end_to_end_seconds: 120
  availability: "99.5%"
dependencies:
  cogs: [enrich_account_health@v1.0.0, deal_score_reasoner@v1.0.0, directive_alignment@v1.0.0, route_exec_alert@v1.0.0, approval_loop@v1.0.0]
feature_flags: []
security:
  pii_policy: "minimize"
  secret_source: "platform_secret_store"
rollback:
  mode: "disable_triggers_and_drain"
