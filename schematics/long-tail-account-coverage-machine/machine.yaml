machine_id: long-tail-account-coverage-machine
version: v1.0.0
owners:
  - team: customer-success-ops
    contact: csops@example.com
  - team: revenue-ops
    contact: revops@example.com
objective: "Automate low-touch long-tail account coverage with monitoring, outreach orchestration, and churn/expansion trigger surfacing."
kpis:
  - id: kpi_1
    name: "Long-tail account coverage rate without human intervention"
    target: "define-per-org"
  - id: kpi_2
    name: "Lead time from churn/expansion signal to surfaced action"
    target: "define-per-org"
  - id: kpi_3
    name: "Approved outreach conversion to next best action"
    target: "define-per-org"
triggers:
  - type: event
    event_types: [account.health_changed, usage.declined, renewal.window_opened, intent.signal_detected]
  - type: schedule
    cron: "0 */6 * * *"
inputs:
  contract: gtm_event_v1
  sources: [product_telemetry, salesforce_headless_360, salesforce, stripe, support_system, endgame_mcp, endgame_cli]
outputs:
  event_contract: gtm_event_v1
  terminal_event_types:
    - longtail.coverage.executed
    - longtail.coverage.blocked
    - longtail.coverage.failed
  side_effects: [coverage_task_create, outbound_email_send, crm_note_append, exec_alert_send]
slo:
  p95_end_to_end_seconds: 300
  availability: "99.5%"
dependencies:
  cogs: [enrich_account_health@v1.0.0, deal_score_reasoner@v1.0.0, directive_alignment@v1.0.0, compose_outreach_message@v1.0.0, route_exec_alert@v1.0.0, approval_loop@v1.0.0]
feature_flags: []
security:
  pii_policy: "minimize"
  secret_source: "platform_secret_store"
rollback:
  mode: "disable_triggers_and_drain"
