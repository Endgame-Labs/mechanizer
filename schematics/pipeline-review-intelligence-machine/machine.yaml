machine_id: pipeline-review-intelligence-machine
version: v1.0.0
owners:
  - team: revenue-ops
    contact: revops@example.com
objective: "Prepare weekly pipeline review packs by flagging stale deals, missing next steps, single-threading risk, and manager-ready summaries."
kpis:
  - id: kpi_1
    name: "Pipeline review prep time reduction"
    target: "define-per-org"
  - id: kpi_2
    name: "Reduction in stale open opportunities"
    target: "define-per-org"
  - id: kpi_3
    name: "Coverage rate of opportunities with explicit next step"
    target: "define-per-org"
triggers:
  - type: schedule
    cron: "0 7 * * 1"
    timezone: "America/Los_Angeles"
  - type: event
    event_types: [pipeline.review.requested, deal.updated, activity.logged]
inputs:
  contract: gtm_event_v1
  sources: [salesforce_headless_360, salesforce, hubspot, gong, slack, endgame_mcp, endgame_cli]
outputs:
  event_contract: gtm_event_v1
  side_effects: [manager_summary_send, rep_task_create, alert_send, crm_note_append]
slo:
  p95_end_to_end_seconds: 300
  availability: "99.5%"
dependencies:
  cogs: [enrich_account_health@v1.0.0, deal_score_reasoner@v1.0.0, directive_alignment@v1.0.0, compose_outreach_message@v1.0.0, route_exec_alert@v1.0.0, approval_loop@v1.0.0]
feature_flags: []
security:
  pii_policy: "minimize"
  secret_source: "platform_secret_store"
rollback:
  mode: "disable_triggers_and_drain"
