schema_version: cog_v1
cog:
  id: deal_score_reasoner
  version: v1.0.0
  display_name: Deal Score Reasoner
  owner: revops-platform
  category: scoring
  description: Produces weighted deal/account score bands and recommended next actions using deterministic + agentic features.
  tags: [scoring, nrr, forecast, prioritization]
input_contract:
  required_fields:
    - subject.account_id
    - attributes.arr
    - attributes.health_score
    - metrics.product_usage_30d
  optional_fields:
    - attributes.renewal_date
    - attributes.open_oppty_amount
    - attributes.public_signals
  accepted_schema_versions: [gtm_event_v1]
output_contract:
  emitted_fields:
    - attributes.deal_score
    - attributes.score_band
    - attributes.score_reasons
    - attributes.recommended_play
  guaranteed_fields:
    - attributes.deal_score
    - attributes.score_band
  failure_mode: emit_partial
execution:
  idempotent: true
  timeout_seconds: 40
  max_retries: 2
  retry_backoff: exponential
  depends_on: [enrich_account_health]
examples:
  input:
    subject:
      account_id: acct_456
    attributes:
      arr: 125000
      health_score: 68
      renewal_date: 2026-07-31
    metrics:
      product_usage_30d: 0.57
  output:
    attributes:
      deal_score: 63
      score_band: monitor
      score_reasons: [usage_decline, renewal_window_open]
      recommended_play: proactive_qbr_and_roi_packet
