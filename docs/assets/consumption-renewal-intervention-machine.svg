<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Consumption Renewal Intervention Machine</title>
  <desc id="desc">Daily under-consuming renewal detection, intervention planning, Slack notify, and optional approved downstream execution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fcf9"/>
      <stop offset="100%" stop-color="#e8f6ee"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f6a45"/>
    </marker>
    <style>
      .t{font:700 32px 'Inter','Segoe UI',sans-serif; fill:#1f5334}
      .l{font:600 18px 'Inter','Segoe UI',sans-serif; fill:#286940}
      .m{font:500 14px 'Inter','Segoe UI',sans-serif; fill:#4c7059}
      .n{fill:#ffffff; stroke:#bedfcb; stroke-width:2}
      .a{fill:#eaf8f0; stroke:#8fcaab; stroke-width:2}
      .g{fill:#fff4e8; stroke:#f0ae65; stroke-width:2.5}
      .f{stroke:#2f6a45; stroke-width:3; fill:none; marker-end:url(#arrow)}
      .p{stroke:#6a9a7f; stroke-width:2.5; stroke-dasharray:10 8; fill:none}
    </style>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="56" y="68" class="t">Consumption Renewal Intervention Machine</text>

  <rect x="70" y="145" width="240" height="95" rx="14" class="n"/>
  <text x="98" y="186" class="l">Daily Renewal Sweep</text>
  <text x="98" y="210" class="m">under-consumption detection</text>

  <rect x="360" y="145" width="250" height="95" rx="14" class="a"/>
  <text x="392" y="186" class="l">Intervention Scoring</text>
  <text x="392" y="210" class="m">priority + play selection</text>

  <rect x="660" y="145" width="250" height="95" rx="14" class="n"/>
  <text x="688" y="186" class="l">Plan Builder</text>
  <text x="688" y="210" class="m">actions, owners, due dates</text>

  <rect x="960" y="145" width="180" height="95" rx="14" class="g"/>
  <text x="986" y="186" class="l">Slack Notify</text>
  <text x="986" y="210" class="m">always-on step</text>

  <rect x="300" y="365" width="280" height="105" rx="14" class="n"/>
  <text x="332" y="410" class="l">Approval Loop</text>
  <text x="332" y="434" class="m">optional action gating</text>

  <rect x="640" y="365" width="500" height="105" rx="14" class="n"/>
  <text x="668" y="398" class="l">Optional Downstream Actions</text>
  <text x="668" y="422" class="m">renewal plan update, CSM task, outbound email</text>
  <text x="668" y="446" class="m">execute only when approved</text>

  <path d="M310 192 L360 192" class="f"/>
  <path d="M610 192 L660 192" class="f"/>
  <path d="M910 192 L960 192" class="f"/>
  <path d="M1050 240 L1050 365" class="p"/>
  <path d="M440 240 L440 365" class="f"/>
  <path d="M580 417 L640 417" class="f"/>

  <rect x="56" y="542" width="1088" height="56" rx="12" fill="#ffffff" stroke="#bedfcb"/>
  <text x="80" y="575" class="m">Contracts: gtm_event_v1 input/output | Smart cogs: enrich, score, align, compose, approval loop.</text>

  <rect x="56" y="614" width="1088" height="52" rx="12" fill="#ffffff" stroke="#bedfcb"/>
  <text x="80" y="646" class="m">Schedule: daily at 07:00 PT | Slack notification mandatory | downstream actions optional + approval-gated.</text>
</svg>
